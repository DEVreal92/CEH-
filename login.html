<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
    background:#0d1117;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:350px;
    background:#161b22;
    padding:30px;
    border-radius:10px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#00ff88;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}

a{
    color:#00ff88;
    cursor:pointer;
}

.hidden{
    display:none;
}

#message{
    text-align:center;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="box">

<div id="loginSection">
<h2>Login</h2>

<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Password">

<button onclick="login()">Login</button>

<p>No account? <a onclick="showSignup()">Sign Up</a></p>
</div>

<div id="signupSection" class="hidden">
<h2>Sign Up</h2>

<input type="email" id="signupEmail" placeholder="Email">
<input type="password" id="signupPassword" placeholder="Password">

<button onclick="signup()">Create Account</button>

<p>Already have account? <a onclick="showLogin()">Login</a></p>
</div>

<p id="message"></p>

</div>

<script>
const supabaseUrl = "https://uonoydntvokuaiurquua.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVvbm95ZG50dm9rdWFpdXJxdXVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDc3NDQsImV4cCI6MjA5NTcyMzc0NH0.f8nr3KboqSkJewnhBKKkhQPT4W0SUXSVjrqThSnS0tc";

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

function showSignup(){
    document.getElementById("loginSection").classList.add("hidden");
    document.getElementById("signupSection").classList.remove("hidden");
}

function showLogin(){
    document.getElementById("signupSection").classList.add("hidden");
    document.getElementById("loginSection").classList.remove("hidden");
}

async function signup(){
    const email = document.getElementById("signupEmail").value;
    const password = document.getElementById("signupPassword").value;

    const { error } = await supabaseClient.auth.signUp({
        email,
        password
    });

    if(error){
        document.getElementById("message").innerText = error.message;
        return;
    }

    document.getElementById("message").innerText =
        "Signup successful! Check your email.";
}

async function login(){
    const email = document.getElementById("loginEmail").value;
    const password = document.getElementById("loginPassword").value;

    const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
    });

    if(error){
        document.getElementById("message").innerText = error.message;
        return;
    }

    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
